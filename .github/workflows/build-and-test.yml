name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x, 25.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Update npm and install dependencies
        run: npm install -g npm@latest && npm ci

      - name: Check linting & formatting
        run: |
          npm run lint:check
          npm run format:check

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test
